<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <title>Frontend skills</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      * {
        box-sizing: border-box;
      }

      .skills-container {
        background-color: gray;
        width: 500px;
        padding: 20px;
        margin: 0 auto;
      }

      .skills-container li {
        list-style-type: none;
        margin: 50px 0;
        font-weight: bolder;
        text-transform: uppercase;
        position: relative;
      }

      /* Background bar */
      .skills-container li::before {
        content: "";
        position: absolute;
        top: calc(100% + 5px);
        left: 0;
        background-color: rgb(170, 167, 173);
        width: 100%;
        height: 25px;
        border-radius: 1000px;
      }

      /* Progress bar */
      .skills-container li::after {
        content: "";
        position: absolute;
        top: calc(100% + 5px);
        left: 0;
        background-color: white;
        width: 0;
        height: 25px;
        border-radius: 1000px;

        animation-duration: 3s;
        animation-delay: 1s;
        animation-fill-mode: forwards; /* FIXED */
      }

      /* Individual skills */
      .skills-container li.html::after {
        animation-name: html;
      }

      .skills-container li.cs::after {
        animation-name: css;
      }

      .skills-container li.js::after {
        animation-name: js;
      }

      .skills-container li.bs::after {
        animation-name: bs;
      }

      .skills-container li.react::after {
        animation-name: react;
      }

      .skills-container li.node::after {
        animation-name: node;
      }

      /* Animations */
      @keyframes html {
        to {
          width: 90%;
          background-color: #ffa500;
        }
      }

      @keyframes css {
        to {
          width: 60%;
          background-color: #663399;
        }
      }

      @keyframes js {
        to {
          width: 10%;
          background-color: #f7df1e;
        }
      }

      @keyframes bs {
        to {
          width: 10%;
          background-color: #602c50;
        }
      }

      @keyframes react {
        to {
          width: 10%;
          background-color: #61dbfb;
        }
      }

      @keyframes node {
        to {
          width: 10%;
          background-color: #6cc24a;
        }
      }
    </style>
  </head>
